<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>개표국 — 도트 국장 성장 단계</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css');
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Galmuri11",monospace;image-rendering:pixelated}
  body{background:#0a0a12;color:#f4f4f4;padding:26px 18px 60px}
  h1{font-family:"Galmuri14";font-size:22px;color:#ffcd75}
  .sub{color:#b8acc8;font-size:13px;margin:8px 0 22px;line-height:1.7;max-width:820px}
  .stages{display:flex;gap:22px;flex-wrap:wrap}
  .card{background:#1a1c2c;border:3px solid #000;box-shadow:inset -3px -3px 0 rgba(0,0,0,.4),inset 3px 3px 0 rgba(255,255,255,.08);padding:16px;width:210px}
  .card .frame{background:repeating-linear-gradient(45deg,#15182a 0 8px,#191c30 8px 16px);border:3px solid #000;display:flex;align-items:flex-end;justify-content:center;height:170px;padding-bottom:6px}
  .card canvas{display:block}
  .card .nm{font-family:"Galmuri14";font-size:14px;color:#73eff7;margin-top:12px}
  .card .ds{font-family:"Galmuri9";font-size:11px;color:#94b0c2;margin-top:5px;line-height:1.6}
  .card .tag{display:inline-block;font-family:"Galmuri9";font-size:10px;background:#29366f;border:2px solid #000;padding:3px 6px;margin-top:8px;color:#ffcd75}
  .note{margin-top:26px;font-family:"Galmuri11";font-size:12px;color:#94b0c2;line-height:1.8;max-width:820px}
  .note b{color:#ffcd75}
  /* 인게임 미리보기(메인 화면에 4단계 배치) */
  .ig{margin-top:34px}
  .ig .lbl{font-family:"Galmuri14";font-size:14px;color:#73eff7;margin-bottom:10px}
  .igrow{display:flex;gap:14px;flex-wrap:wrap}
  .igph{width:150px;background:#1a1c2c;border:3px solid #000;box-shadow:inset -3px -3px 0 rgba(0,0,0,.4);padding:10px;text-align:center}
  .igph .num{font-family:"Galmuri14";font-size:13px;color:#fff}
  .igph .fr{background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0 2px,transparent 2px 4px),radial-gradient(circle at 50% 70%,#222b55,#141627);height:120px;display:flex;align-items:flex-end;justify-content:center;border:2px solid #000;margin:8px 0}
  .igph .cap{font-family:"Galmuri9";font-size:10px;color:#94b0c2}
</style>
</head>
<body>
  <h1>도트 국장 — 성장 4단계</h1>
  <div class="sub">거지키우기처럼 진행/프레스티지(승급)에 따라 캐릭터가 자랍니다. <b style="color:#fff">넝마 개표원 → 말단 직원 → 정장 국장 → 명예 국장(금장·망토)</b>. 16×16 도트, 같은 골격에서 머리·복장·장식만 바뀝니다. 실제 게임에선 이 SVG를 그대로/PNG로 써서 메인 캐릭터로 표시합니다.</div>

  <div class="stages" id="stages"></div>

  <div class="ig">
    <div class="lbl">▌ 메인 화면에 올렸을 때</div>
    <div class="igrow" id="igrow"></div>
  </div>

  <div class="note">
    이 4단계로 확정할까요? 조정 포인트 예: <b>색감</b>(피부/옷 톤), <b>표정</b>(멍함→자신감), <b>장식</b>(망토 대신 금테안경/훈장 등), <b>단계 수</b>(4단계 → 6단계 더 잘게). 괜찮으면 이대로 리빌드 에셋으로 확정합니다.
  </div>

<script>
const PAL = {
  '.':null, k:'#14121c',
  s:'#f1c79b', S:'#d89c6a',
  h:'#4a3016', H:'#6b471f',
  e:'#15121a',
  r:'#6b4a2a', R:'#8a6238',            // 넝마 갈색
  g:'#8a94a6', G:'#b3bccc',            // 회색 셔츠
  j:'#2f3a8c', J:'#3b5dc9',            // 남색 정장
  t:'#b13e53',                          // 빨강 넥타이
  w:'#f4f4f4',                          // 흰 칼라
  y:'#ffcd75', Y:'#ffd34d',            // 금
  p:'#7b3fa0', P:'#a45cc8',            // 망토 보라
  c:'#73eff7'
};

// 16x16 도트 맵 (각 줄 = y, 각 문자 = x)
const STAGE1 = [   // 넝마 개표원
".....hhhh.......",
"...hh.hhhh.h....",
"..hhhhhhhhhh....",
"..hhhhhhhhhh....",
"..hhssssssh.....",
"..hsssssssss....",
"..hseSssseSs....",
"..ssssssssss....",
"...sssSSsss.....",
"....ssssss......",
"...rRrrrrRr.....",
"..rrrrrrrrrr....",
"..rRrrrrrrRr....",
"..rrrrrrrrrr....",
"..rr.rrrr.rr....",
"..rr......rr...."
];
const STAGE2 = [   // 말단 직원 (회색 셔츠)
"....hhhhhh......",
"...hhhhhhhh.....",
"..hhhhhhhhhh....",
"..hhssssssh.....",
"..hsssssssss....",
"..hseSssseSs....",
"..ssssssssss....",
"...sssSSsss.....",
"....ssssss......",
"...gggwwggg.....",
"..gggggggggg....",
"..ggggkkgggg....",
"..gggggggggg....",
"..gggkggkggg....",
"..gg......gg....",
"..gg......gg...."
];
const STAGE3 = [   // 정장 국장 (남색 + 넥타이 + 배지)
"....hhhhhh......",
"...hHhhhhHh.....",
"..hhhhhhhhhh....",
"..hhssssssh.....",
"..hsssssssss....",
"..hseSssseSs....",
"..ssssssssss....",
"...sssSSsss.....",
"....wwwwww......",
"..jjjwttwjjj....",
"..jjjjttjjjj....",
"..jjJjttjJjjY...",
"..jjjjjjjjjj....",
"..jjjjjjjjjj....",
"..jjj....jjj....",
"..jj......jj...."
];
const STAGE4 = [   // 명예 국장 (금장 + 망토)
"...YhhhhhhY.....",
"..hHhhhhhhHh....",
"..hhhhhhhhhh....",
"..hhssssssh.....",
"..hsssssssss....",
"..hseSssseSs....",
"..ssssssssss....",
"...sssSSsss.....",
".pPwwwwwwwwPp...",
".pjjjwttwjjjp...",
".pjjjjttjjjjp...",
".pjjYYttYYjjp...",
".pjjjjjjjjjjp...",
"..jjjjjjjjjj....",
"..jjj....jjj....",
"..jj......jj...."
];

function draw(map, cell){
  const c=document.createElement("canvas");
  c.width=16*cell; c.height=16*cell;
  const x=c.getContext("2d"); x.imageSmoothingEnabled=false;
  for(let y=0;y<map.length;y++){
    const row=map[y];
    for(let i=0;i<row.length;i++){
      const col=PAL[row[i]];
      if(!col) continue;
      // 1px 검정 외곽선 느낌: 먼저 어두운 테두리
      x.fillStyle=col;
      x.fillRect(i*cell,y*cell,cell,cell);
    }
  }
  // 외곽선: 비어있다가 채워진 경계에 검정
  return c;
}

const META=[
  {m:STAGE1,nm:"1. 넝마 개표원",ds:"맨바닥 시작. 헝클어진 머리, 누더기, 멍한 표정",tag:"시작"},
  {m:STAGE2,nm:"2. 말단 직원",ds:"단정해진 머리, 회색 셔츠. 일이 손에 익는 단계",tag:"승급 1회"},
  {m:STAGE3,nm:"3. 정장 국장",ds:"남색 정장 · 빨강 넥타이 · 가슴 배지. 한자리 차지",tag:"승급 다수"},
  {m:STAGE4,nm:"4. 명예 국장",ds:"금장 · 보라 망토 · 훈장. 전설의 개표국장",tag:"훈장 단계"}
];

const stages=document.getElementById("stages");
META.forEach(o=>{
  const card=document.createElement("div"); card.className="card";
  const fr=document.createElement("div"); fr.className="frame";
  fr.appendChild(draw(o.m,7));
  card.appendChild(fr);
  card.insertAdjacentHTML("beforeend",
    `<div class="nm">${o.nm}</div><div class="ds">${o.ds}</div><div class="tag">${o.tag}</div>`);
  stages.appendChild(card);
});

const igrow=document.getElementById("igrow");
const NUMS=["1,204","18.7만","6.2억","999조"];
META.forEach((o,i)=>{
  const ph=document.createElement("div"); ph.className="igph";
  const fr=document.createElement("div"); fr.className="fr";
  fr.appendChild(draw(o.m,5));
  ph.innerHTML=`<div class="num">${NUMS[i]} 표</div>`;
  ph.appendChild(fr);
  ph.insertAdjacentHTML("beforeend",`<div class="cap">${o.nm.replace(/^\d+\.\s*/,"")}</div>`);
  igrow.appendChild(ph);
});
</script>
</body>
</html>
